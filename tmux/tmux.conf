set-option -g default-terminal "tmux-256color"
# set-option -ga terminal-overrides ",wezterm*:Tc"
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -g default-command "reattach-to-user-namespace -l $SHELL"

unbind C-b
set-option -g prefix C-t
bind-key C-t send-prefix

set-option -g history-limit 50000
set-option -g initial-repeat-time 500
set-option -g display-time 4000
set-option -g renumber-windows on
set-option -g monitor-bell on
set-option -g extended-keys on
set-option -g extended-keys-format csi-u
set-option -sg escape-time 0          
set-option -g focus-events on        

bind-key c new-window -c "~"
bind-key '"' split-window -c "~"
bind-key % split-window -h -c "~"

bind-key -T copy-mode-vi 'v' send -X begin-selection
set-window-option -g mode-keys vi
set-option -g @shell_mode 'vi'

bind-key -n M-r source-file "$HOME/.config/tmux/tmux.conf" \; source-file "$HOME/.config/tmux/snapshot.conf" \; display "Reloaded!"
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R
bind-key -n M-Left resize-pane -L 5
bind-key -n M-Right resize-pane -R 5
bind-key -n M-Up resize-pane -U 5
bind-key -n M-Down resize-pane -D 5
# bind-key -n M-[ copy-mode
bind-key -n M-[ switch-client -p
bind-key -n M-] switch-client -n
bind-key -n M-d detach-client
bind-key -n M-w choose-tree -Z
bind-key -n M-n next-window
bind-key -n M-p previous-window
bind-key -n M-z resize-pane -Z

bind-key C-t run-shell "~/.local/bin/tt_toggle"

source-file ~/.config/tmux/snapshot.conf

run-shell "$HOME/.config/tmux/plugins/tmux-now-playing/now-playing.tmux"
run-shell "$HOME/.config/tmux/plugins/tmux-yank/yank.tmux"
run-shell "$HOME/.config/tmux/plugins/tmux-copycat/copycat.tmux"
run-shell "$HOME/.config/tmux/plugins/tmux-resurrect/resurrect.tmux"
run-shell "$HOME/.config/tmux/plugins/tmux-nerd-font-window-name/tmux-nerd-font-window-name.tmux"
