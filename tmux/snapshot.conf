# tokens extracted from vim-airline/-theme highlight groups
# extraction script: https://github.com/dorukozerr/dotfiles/blob/main/scripts/bin/t_ap
# t_ap [theme] -w

# >>> theme tokens (airline: base16_grayscale) >>>
%hidden BG="#252525"          # airline_c bg / background
%hidden BG_ALT="#252525"      # status fill            (airline_c bg)
%hidden SEL="#464646"         # mid panel / section B  (airline_b bg)
%hidden FG_DIM="#b9b9b9"      # inactive text          (airline_c_inactive fg)
%hidden FG="#e3e3e3"          # section text           (airline_b fg)

# ---- airline section roles ----
# Section A = mode/title (highlighted), B = middle, C = outer status fill.
%hidden A_FG="#252525"
%hidden A_BG="#8e8e8e"
%hidden B_FG="${FG}"
%hidden B_BG="${SEL}"
%hidden C_FG="${FG_DIM}"
%hidden C_BG="${BG_ALT}"
# <<< theme tokens <<<

set -g @left_sep ""
set -g @right_sep ""

# Pane borders
set -g pane-border-style "fg=${BG_ALT}"
set -g pane-active-border-style "fg=${A_BG}"
set -g pane-border-lines single
set -g pane-border-indicators colour

# Copy mode (visual selection)
set -g mode-style "bg=${SEL},fg=${FG}"

# Command/message line
set -g message-style "bg=${SEL},fg=${FG}"
set -g message-command-style "bg=${SEL},fg=${FG}"

set -g allow-rename on
set -g automatic-rename on

# Status bar - matches airline with Section A, B, C
set -g status "on"
set -g status-justify "left"
set -g status-style "bg=${C_BG}"
set -g status-left-style "none"
set -g status-right-style "none"
set -g status-right-length "250"
set -g status-left-length "100"
set -g status-interval 1

set -g  status-left "#[fg=${A_FG},bg=${A_BG},bold] #S #[fg=${A_BG},bg=${B_BG},nobold,nounderscore,noitalics]#{@left_sep}"
set -ag status-left "#[fg=${B_FG},bg=${B_BG}] #I:#P #[fg=${B_BG},bg=${C_BG},nobold,nounderscore,noitalics]#{@left_sep}"

set -g status-right "#[fg=${A_BG},bg=${C_BG}]#{@right_sep}#[fg=${A_FG},bg=${A_BG},bold] #(t_tt status) #[fg=${A_BG},bg=${C_BG},nobold,nounderscore,noitalics]#{@left_sep}"
set -ag  status-right "#{session_dots} #[fg=${C_FG},bg=${C_BG},bold] #{now_playing} #[fg=${B_BG},bg=${C_BG}]#{@right_sep}"
set -ag status-right "#[fg=${B_FG},bg=${B_BG},bold] #(tmux-mem-cpu-load -m 2) #[fg=${A_BG},bg=${B_BG}]#{@right_sep}"
set -ag status-right "#[fg=${A_FG},bg=${A_BG},bold] %R "

# Inactive windows (Section C style)
set -g window-status-format "#[fg=${C_BG},bg=${C_BG},nobold,nounderscore,noitalics]#{@left_sep}#[default,fg=${C_FG},bg=${C_BG}] #W #[fg=${C_BG},bg=${C_BG}]#{@left_sep}"

# Active window (Section A style - highlighted)
set -g window-status-current-format "#[fg=${C_BG},bg=${A_BG},nobold,nounderscore,noitalics]#{@left_sep}#[fg=${A_FG},bg=${A_BG},bold] #W #[fg=${A_BG},bg=${C_BG},bold]#{@left_sep}"
